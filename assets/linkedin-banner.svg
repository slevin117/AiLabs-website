<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="191" viewBox="0 0 1128 191">
  <rect width="1128" height="191" fill="#0e0f0c"/>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;display=swap');
    </style>
  </defs>
  <!-- Decorative dots — left -->
  <circle cx="80" cy="50" r="18" fill="#9fe870" opacity="0.1"/>
  <circle cx="110" cy="80" r="10" fill="#9fe870" opacity="0.18"/>
  <circle cx="60" cy="95" r="6" fill="#9fe870" opacity="0.28"/>
  <!-- Wordmark — centred -->
  <text
    x="564" y="88"
    font-family="'Archivo', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="64"
    letter-spacing="-0.03em"
    fill="#ffffff"
    text-anchor="middle"
    font-feature-settings="'calt' 1"
  >AiLabs</text>
  <circle cx="700" cy="85" r="5.5" fill="#9fe870"/>
  <!-- Tagline — centred below -->
  <text
    x="564" y="125"
    font-family="'Inter', 'Helvetica', Arial, sans-serif"
    font-weight="500"
    font-size="16"
    fill="#868685"
    text-anchor="middle"
    letter-spacing="0.02em"
  >AI that works. For businesses that do.</text>
  <!-- Decorative dots — right -->
  <circle cx="1020" cy="55" r="20" fill="#9fe870" opacity="0.1"/>
  <circle cx="1055" cy="85" r="12" fill="#9fe870" opacity="0.18"/>
  <circle cx="1070" cy="50" r="7" fill="#9fe870" opacity="0.28"/>
  <!-- Subtle top/bottom line accents -->
  <rect x="440" y="145" width="248" height="1" fill="#9fe870" opacity="0.15" rx="1"/>
</svg>
